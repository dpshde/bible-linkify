name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm typecheck
      - run: pnpm build
      # Regression: bin symlink must exit 1 on unlinked refs (npx path)
      - name: CLI bin exit codes
        run: |
          echo 'John 3:16' > dirty.md
          echo '[John 3:16](https://route.bible/jhn.3.16)' > clean.md

          set +e
          node dist/cli.js --check dirty.md
          code=$?
          set -e
          test "$code" -eq 1

          # Simulate npm .bin symlink
          ln -sf "$(pwd)/dist/cli.js" ./bible-linkify-bin
          set +e
          ./bible-linkify-bin --check dirty.md
          code=$?
          set -e
          test "$code" -eq 1

          set +e
          ./bible-linkify-bin --check clean.md
          code=$?
          set -e
          test "$code" -eq 0
